name: Ladder
options:
  bundleIdPrefix: com.mattalton
  deploymentTarget:
    macOS: '26.0'
  createIntermediateGroups: true

targets:
  Ladder:
    type: application
    platform: macOS
    sources:
      # Slice contract markdown and colocated tests never compile into the app
      # (Ladder/Profile/decisions/0001).
      - path: Ladder
        excludes:
          - '**/*Tests.swift'
          - '**/*.md'
          - '**/decisions'
      # Versioned prompt files, loaded at runtime (CLAUDE.md: Prompts/ is
      # canonical; CVImport SPEC.md [CVIMPORT-13]).
      - path: Prompts
        type: folder
        buildPhase: resources
      # Canned fixture CVs + proposal JSON: the fixture-driven intelligence
      # service reads these until live calls arrive with the tailor slice.
      - path: LadderTests/Fixtures
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattalton.Ladder
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ''
        SWIFT_VERSION: '6.0'
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: '-'
        ENABLE_HARDENED_RUNTIME: YES

  LadderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      # Fixtures ship in the app bundle (see the Ladder target) and tests run
      # in the app host, so they load from Bundle.main — not duplicated here.
      - path: LadderTests
        excludes:
          - Fixtures
      # Colocated slice tests (Ladder/Profile/decisions/0001).
      - path: Ladder
        includes:
          - '**/*Tests.swift'
    dependencies:
      - target: Ladder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: '6.0'
        TEST_HOST: '$(BUILT_PRODUCTS_DIR)/Ladder.app/Contents/MacOS/Ladder'
        BUNDLE_LOADER: '$(TEST_HOST)'

schemes:
  Ladder:
    build:
      targets:
        Ladder: all
    test:
      targets:
        - LadderTests
