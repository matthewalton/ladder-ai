# DRAFT — Stage 3 of the Tessl agentic code-review setup.
# Parked here on purpose: it is NOT under .github/workflows/ yet, so GitHub will
# not run it while it is incomplete. Move it to .github/workflows/tessl-review.yml
# once the two TODOs below are resolved (see tessl-review/ci/STAGE3-HANDOFF.md).
#
# What this does when finished: on every PR (and on a gated `@tessl-change-review`
# comment), run the vendored built-in lenses + the Ladder lens over the PR diff,
# then post one overall review with inline comments.

name: Tessl code review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created] # gated manual re-run via `@tessl-change-review` (see the if: below)

permissions:
  contents: read # read the diff
  pull-requests: write # post the review + inline comments

concurrency:
  group: tessl-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # Auto-run on PR events; on comments, only when an insider types the trigger phrase.
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@tessl-change-review') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history so --base can diff against the merge base
          # On issue_comment the default checkout is the default branch; check out the PR head.
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      # TODO(1): Confirm the official CLI install for CI at https://docs.tessl.io
      # (the local machine used a "native" install to ~/.local/bin/tessl, v0.92.0).
      # Replace this step with the documented installer or a pinned binary download.
      - name: Install Tessl CLI
        run: |
          curl -fsSL https://get.tessl.io/install.sh | sh   # <-- VERIFY this URL/flag against the docs
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          tessl --version

      - name: Run change review
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # A detached PR checkout often has no origin/main tracking ref, so pass --base explicitly.
          BASE="origin/${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}"
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}"
          tessl change review run \
            --skill tessl/code-review#review-code-legibility \
            --skill tessl/code-review#review-test-risk \
            --skill tessl/code-review#review-contract-boundaries \
            --skill tessl/code-review#review-security-risks \
            --skill tessl/code-review#review-local-precedent \
            --skill tessl-review/skills/review-ladder-conventions \
            --base "$BASE" \
            --model anthropic/claude-sonnet-4-5 \
            --json --output review.json

      # TODO(2): Confirm the review.json field names by inspecting a real
      # `--json` run locally (summary text + inline comments as {path,line,side,body}),
      # then map them onto GitHub's "Create a review" API. This step is a concrete
      # starting point using `gh api`, but the jq field paths MUST be verified.
      - name: Post review to the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number || github.event.issue.number }}"
          # Build the GitHub review payload from review.json (VERIFY field paths):
          jq '{
            body: .summary,
            event: "COMMENT",
            comments: [ .inlineComments[]? | { path: .path, line: .line, side: (.side // "RIGHT"), body: .body } ]
          }' review.json > gh-review.json
          gh api "repos/${{ github.repository }}/pulls/${PR}/reviews" \
            --method POST --input gh-review.json
